<title>Applied Data Science — Curriculum Map</title>
<style>
  /* Base Reset & Variables */
  :root {
    --primary: #1a1a1a;
    --accent: #800000;
    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --border: #e0dfd8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--primary); padding: 2rem 1rem; line-height: 1.5; }

  /* Header & Toolbar */
  .page-header { max-width: 1100px; margin: 0 auto 2rem; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  
  .toolbar { max-width: 1100px; margin: 0 auto 2rem; display: flex; flex-direction: column; gap: 1rem; }
  
  /* Topic Search Styling */
  .search-container { position: relative; max-width: 500px; }
  .topic-select { 
    width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #d0cfc8; 
    appearance: none; background: #fff; font-size: 14px; cursor: pointer;
  }
  
  .active-topic-banner {
    display: none; align-items: center; gap: 10px; padding: 10px 15px; 
    background: var(--accent); color: white; border-radius: 8px; font-size: 13px; font-weight: 600;
  }
  .active-topic-banner.show { display: flex; }
  .clear-btn { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

  /* Grid & Cards */
  .semester-grid { max-width: 1100px; margin: 0 auto; }
  .semester-block { margin-bottom: 3rem; }
  .semester-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .semester-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; }
  .semester-line { flex: 1; height: 1px; background: #ddd; }
  
  .course-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
  
 .course-card { 
  background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; 
  transition: all 0.2s; position: relative; display: flex; flex-direction: column;
  border-top: 4px solid var(--cat-color, #ccc);
 }
  .course-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
  .course-code { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 4px; }
  .course-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; flex-grow: 1; }

  /* Clickable Topics */
  .topic-tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .topic-tag { 
    font-size: 10px; padding: 3px 8px; background: #eee; border-radius: 4px; 
    cursor: pointer; color: #555; font-weight: 600; transition: background 0.2s;
  }
  .topic-tag:hover { background: var(--accent); color: #fff; }

  /* Modal */
  .modal-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
    backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; 
  }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; width: 90%; max-width: 600px; border-radius: 16px; max-height: 85vh; overflow-y: auto; padding: 30px; }
  .modal-header { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
  .section-title { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; margin: 20px 0 10px; }
</style>
</head>

let activeTopic = "";

function init() {
  populateTopicSelector();
  renderGrid();
  
  // Handle Selector Change
  document.getElementById('globalTopicSelector').addEventListener('change', (e) => {
    filterByTopic(e.target.value);
  });
}

function populateTopicSelector() {
  const select = document.getElementById('globalTopicSelector');
  TOPIC_REGISTRY.sort().forEach(topic => {
    const opt = document.createElement('option');
    opt.value = topic;
    opt.textContent = topic;
    select.appendChild(opt);
  });
}

function filterByTopic(topic) {
  activeTopic = topic;
  const banner = document.getElementById('activeFilterBanner');
  const nameSpan = document.getElementById('currentTopicName');
  
  if (topic) {
    banner.classList.add('show');
    nameSpan.textContent = topic;
    document.getElementById('globalTopicSelector').value = topic;
  } else {
    banner.classList.remove('show');
    document.getElementById('globalTopicSelector').value = "";
  }
  renderGrid();
}

function clearTopicFilter() {
  filterByTopic("");
}

function renderGrid() {
  const grid = document.getElementById('semesterGrid');
  grid.innerHTML = '';

  CATEGORY_ORDER.forEach(catKey => {
    const cat = CATEGORIES[catKey];
    const visible = COURSES.filter(c =>
      c.cat === catKey &&
      (activeTopic === "" || c.topics.includes(activeTopic))
    );

    if (visible.length === 0) return;

    const block = document.createElement('div');
    block.className = 'semester-block';
    block.innerHTML = `
      <div class="semester-header">
        <span class="semester-label" style="color:${cat.color}">${cat.label}</span>
        <div class="semester-line"></div>
      </div>
      <div class="course-row"></div>
    `;

    const row = block.querySelector('.course-row');
    visible.forEach(c => {
      const card = document.createElement('div');
      card.className = 'course-card';
      card.style.borderTop = `4px solid ${cat.color}`;

      card.innerHTML = `
        <div class="course-code">${c.code}</div>
        <div class="course-name">${c.name}</div>
          ${c.prereqs && c.prereqs.length > 0 ? `<div style="font-size:11px; color:#999; margin-bottom:4px;">Prereqs: ${c.prereqs.join(', ')}</div>` : ''}
        <div class="topic-tag-list">
          ${c.topics.map(t => `<span class="topic-tag" onclick="event.stopPropagation(); filterByTopic('${t}')">${t}</span>`).join('')}
        </div>
      `;
      card.onclick = () => openModal(c);
      row.appendChild(card);
    });
    grid.appendChild(block);
  });
}

function openModal(c) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-header">
      <div class="course-code">${c.code}</div>
      <h2>${c.name}</h2>
    </div>
    <p>${c.desc}</p>
    ${c.prereqs && c.prereqs.length > 0 ? `
    <div class="section-title">Prerequisites</div>
    <p style="font-size:13px; color:#555;">${c.prereqs.join(', ')}</p>
  ` : ''}
    ${c.outcomes && c.outcomes.length > 0 ? `
  <div class="section-title">Learning Outcomes</div>
  <ul style="font-size:13px; color:#555; padding-left: 1.2rem; display: flex; flex-direction: column; gap: 6px;">
    ${c.outcomes.map(o => `<li>${o}</li>`).join('')}
  </ul>
` : ''}
    <div class="section-title">Topic Mapping</div>
    <div class="topic-tag-list">
      ${c.topics.map(t => `<span class="topic-tag" style="font-size:12px; padding:6px 12px;" onclick="closeModal(); filterByTopic('${t}')">${t}</span>`).join('')}
    </div>
  `;
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

init();
</script>
